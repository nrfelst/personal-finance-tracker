# Server port configurations
server.port=8080

# SQLite datasource URL and credentials configurations
spring.datasource.url=jdbc:sqlite:finance_tracker.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Automatically run schema.sql on database initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Custom application logger levels
logging.level.org.springframework.web=INFO
logging.level.com.finance.tracker=DEBUG
